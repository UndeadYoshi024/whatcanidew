<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dew</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #7efff5;
      --muted: #444;
      --text: #e8e8e8;
      --dim: #888;
      --error: #ff6b6b;
      --success: #7efff5;
    }

    body {
      font-family: monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      overflow: hidden;
    }

    header {
      padding: 28px 48px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: normal;
    }

    header p { font-size: 0.78rem; color: var(--dim); letter-spacing: 0.06em; }

    main {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Left panel ── */
    .panel {
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .panel::-webkit-scrollbar { width: 3px; }
    .panel::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Right output ── */
    .output {
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    .output-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .result-area {
      flex: 1;
      overflow-y: auto;
      font-size: 0.82rem;
      line-height: 1.8;
      min-height: 0;
    }

    .result-area::-webkit-scrollbar { width: 4px; }
    .result-area::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Tool strip ── */
    .tool-strip {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      overflow: hidden;
    }

    .tool-block {
      padding: 20px 24px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-block:last-child { border-right: none; }

    /* ── Log drawer ── */
    .log-drawer {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-rows: auto 1fr;
      height: 180px;
    }

    .log-header {
      padding: 10px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .log-header .output-label { border: none; padding: 0; margin: 0; }

    .log-body {
      padding: 10px 48px;
      overflow-y: auto;
      font-size: 0.72rem;
      line-height: 1.7;
      color: var(--dim);
    }

    .log-body::-webkit-scrollbar { width: 4px; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); }

    .log-line { word-break: break-all; }
    .log-line.fresh { color: var(--accent); }

    /* ── Shared components ── */
    .field-group { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
    }

    input[type="text"] {
      width: 100%;
      font-family: monospace;
      font-size: 0.82rem;
      padding: 7px 9px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      font-family: monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.primary:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
    .btn.sm { padding: 5px 10px; width: auto; font-size: 0.68rem; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-row { display: flex; flex-direction: column; gap: 6px; }

    .status {
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--dim);
      min-height: 1.1em;
      word-break: break-word;
    }

    .status.error { color: var(--error); }
    .status.ok { color: var(--success); }

    .stat-row { display: flex; gap: 20px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-size: 1.4rem; color: var(--accent); letter-spacing: 0.04em; }
    .stat-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }

    .divider { border: none; border-top: 1px solid var(--border); }

    .cluster { margin-bottom: 18px; }
    .cluster-header {
      font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 6px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .cluster-nodes { display: flex; flex-wrap: wrap; gap: 5px; }
    .node-tag {
      font-size: 0.72rem; padding: 2px 7px;
      border: 1px solid var(--border); color: var(--dim); letter-spacing: 0.04em;
    }
    .node-tag.hub { border-color: var(--accent); color: var(--accent); }

    .empty-state { color: var(--muted); font-size: 0.82rem; letter-spacing: 0.06em; padding-top: 8px; }

    footer {
      display: none; /* replaced by log drawer */
    }
  </style>
</head>
<body>

  <header>
    <h1>Dew</h1>
    <p>Signal from noise. Every time.</p>
  </header>

  <main>

    <!-- ── Left panel ── -->
    <aside class="panel">

      <div class="field-group">
        <label for="load-path">Data path</label>
        <input type="text" id="load-path" placeholder="/path/to/data.json">
      </div>
      <button class="btn primary" id="btn-load">Load graph</button>
      <div class="status" id="load-status"></div>

      <hr class="divider">

      <div class="stat-row" id="stats" style="display:none">
        <div class="stat">
          <span class="stat-value" id="stat-nodes">—</span>
          <span class="stat-label">Nodes</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-edges">—</span>
          <span class="stat-label">Edges</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-clusters">—</span>
          <span class="stat-label">Clusters</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="btn-run" disabled>Run Dew</button>
        <button class="btn" id="btn-snapshot" disabled>Snapshot .dew</button>
      </div>
      <div class="status" id="run-status"></div>

      <hr class="divider">

      <button class="btn" id="btn-health">Health check</button>

    </aside>

    <!-- ── Output ── -->
    <section class="output">
      <div class="output-label" id="output-label">Awaiting graph</div>
      <div class="result-area" id="result-area">
        <p class="empty-state">Load a graph to begin.</p>
      </div>
    </section>

  </main>

  <!-- ── Tool strip ── -->
  <div class="tool-strip">

    <!-- Synthesize -->
    <div class="tool-block">
      <div class="output-label">Synthesize intent</div>
      <div class="field-group">
        <label for="synth-intent">Intent string</label>
        <input type="text" id="synth-intent" placeholder="get there fast, avoid construction">
      </div>
      <button class="btn primary" id="btn-synthesize">Synthesize</button>
      <div class="status" id="synth-status"></div>
    </div>

    <!-- Path stored -->
    <div class="tool-block">
      <div class="output-label">Path — stored graph</div>
      <div class="field-group">
        <label for="path-start">Start</label>
        <input type="text" id="path-start" placeholder="node_a">
      </div>
      <div class="field-group">
        <label for="path-target">Target</label>
        <input type="text" id="path-target" placeholder="node_z">
      </div>
      <button class="btn primary" id="btn-path-stored" disabled>Find path</button>
      <div class="status" id="path-status"></div>
    </div>

    <!-- Route stored + intent -->
    <div class="tool-block">
      <div class="output-label">Route — intent + stored graph</div>
      <div class="field-group">
        <label for="route-intent">Intent</label>
        <input type="text" id="route-intent" placeholder="avoid congested hubs">
      </div>
      <div class="field-group">
        <label for="route-start">Start</label>
        <input type="text" id="route-start" placeholder="node_a">
      </div>
      <div class="field-group">
        <label for="route-target">Target</label>
        <input type="text" id="route-target" placeholder="node_z">
      </div>
      <button class="btn primary" id="btn-route-stored" disabled>Route</button>
      <div class="status" id="route-status"></div>
    </div>

    <!-- Nearest stored -->
    <div class="tool-block">
      <div class="output-label">Nearest — stored graph</div>
      <div class="field-group">
        <label for="nearest-start">Start</label>
        <input type="text" id="nearest-start" placeholder="triage">
      </div>
      <div class="field-group">
        <label for="nearest-candidates">Candidates (comma-separated)</label>
        <input type="text" id="nearest-candidates" placeholder="bed_01, bed_02, bed_03">
      </div>
      <button class="btn primary" id="btn-nearest" disabled>Find nearest</button>
      <div class="status" id="nearest-status"></div>
    </div>

    <!-- Reorganize -->
    <div class="tool-block">
      <div class="output-label">Reorganize directory</div>
      <div class="field-group">
        <label for="reorg-path">Directory path</label>
        <input type="text" id="reorg-path" placeholder="/path/to/messy/dir">
      </div>
      <button class="btn primary" id="btn-reorg">Make it pretty</button>
      <div class="status" id="reorg-status"></div>
    </div>

  </div>

  <!-- ── Log drawer ── -->
  <div class="log-drawer">
    <div class="log-header">
      <div class="output-label">Activity log</div>
      <button class="btn sm" id="btn-log-refresh">Refresh</button>
      <span class="status" id="log-status" style="margin-left:auto"></span>
      <span id="snapshot-path" style="font-size:0.68rem;color:var(--dim);letter-spacing:0.04em;"></span>
    </div>
    <div class="log-body" id="log-body">
      <span style="color:var(--muted)">—</span>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8000';
    let _lastResult = null;
    let _storedNodes = null; // flat node list from last /load

    async function post(path, body) {
      const res = await fetch(API + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.statusText);
      return data;
    }

    async function get(path) {
      const res = await fetch(API + path);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.statusText);
      return data;
    }

    function setStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'status' + (type ? ' ' + type : '');
    }

    function showOutput(label, html) {
      document.getElementById('output-label').textContent = label;
      document.getElementById('result-area').innerHTML = html;
    }

    function renderJSON(data) {
      return '<pre style="white-space:pre-wrap;word-break:break-all;color:var(--text);font-size:0.8rem;line-height:1.6;">' + JSON.stringify(data, null, 2) + '</pre>';
    }

    function renderClusters(clusters) {
      if (!clusters || clusters.length === 0) {
        return '<p class="empty-state">Graph is fully connected — no isolated clusters.</p>';
      }
      return clusters.map(function(cluster, i) {
        const hub = cluster.hub;
        const tags = cluster.members.map(function(n) {
          return '<span class="node-tag' + (n === hub ? ' hub' : '') + '">' + n + '</span>';
        }).join('');
        return '<div class="cluster"><div class="cluster-header">Cluster ' + (i + 1) + (hub ? ' — hub: ' + hub : '') + '</div><div class="cluster-nodes">' + tags + '</div></div>';
      }).join('');
    }

    // ── Log ──────────────────────────────────────────────────────────────────

    async function refreshLog(highlight) {
      try {
        const data = await get('/log');
        const lines = data.lines || [];
        const body = document.getElementById('log-body');
        if (!lines.length) {
          body.innerHTML = '<span style="color:var(--muted)">Log is empty.</span>';
          return;
        }
        body.innerHTML = lines.map(function(l, i) {
          const fresh = highlight && i === lines.length - 1;
          return '<div class="log-line' + (fresh ? ' fresh' : '') + '">' + l + '</div>';
        }).join('');
        body.scrollTop = body.scrollHeight;
        setStatus('log-status', lines.length + ' lines', '');
      } catch (e) {
        setStatus('log-status', e.message, 'error');
      }
    }

    document.getElementById('btn-log-refresh').addEventListener('click', function() {
      refreshLog(false);
    });

    // auto-refresh log every 5s
    setInterval(function() { refreshLog(false); }, 5000);
    refreshLog(false);

    // ── Load graph ───────────────────────────────────────────────────────────

    document.getElementById('btn-load').addEventListener('click', async function() {
      const path = document.getElementById('load-path').value.trim();
      if (!path) { setStatus('load-status', 'Enter a path.', 'error'); return; }
      setStatus('load-status', 'Loading…');
      try {
        const data = await post('/load', { path: path });
        document.getElementById('stat-nodes').textContent = data.nodes;
        document.getElementById('stat-edges').textContent = data.edges;
        document.getElementById('stat-clusters').textContent = '—';
        document.getElementById('stats').style.display = 'flex';
        document.getElementById('btn-run').disabled = false;
        document.getElementById('btn-path-stored').disabled = false;
        document.getElementById('btn-route-stored').disabled = false;
        document.getElementById('btn-nearest').disabled = false;
        showOutput('Graph loaded — ' + data.nodes + ' nodes, ' + data.edges + ' edges', '<p class="empty-state">Press Run Dew to analyse clusters, or use the tools below.</p>');
        setStatus('load-status', 'Loaded.', 'ok');
        refreshLog(true);
      } catch (e) {
        setStatus('load-status', e.message, 'error');
      }
    });

    // ── Run / Snapshot ───────────────────────────────────────────────────────

    document.getElementById('btn-run').addEventListener('click', async function() {
      setStatus('run-status', 'Running…');
      document.getElementById('btn-run').disabled = true;
      document.getElementById('btn-snapshot').disabled = true;
      try {
        const data = await post('/run', {});
        _lastResult = data;
        document.getElementById('stat-clusters').textContent = data.clusters ? data.clusters.length : '0';
        showOutput('Clusters — ' + (data.clusters ? data.clusters.length : 0) + ' found', renderClusters(data.clusters));
        document.getElementById('btn-snapshot').disabled = false;
        setStatus('run-status', 'Done.', 'ok');
        refreshLog(true);
      } catch (e) {
        setStatus('run-status', e.message, 'error');
      } finally {
        document.getElementById('btn-run').disabled = false;
      }
    });

    document.getElementById('btn-snapshot').addEventListener('click', async function() {
      if (!_lastResult) return;
      try {
        const data = await post('/snapshot', { result: _lastResult });
        document.getElementById('snapshot-path').textContent = data.path;
        setStatus('run-status', 'Snapshot saved.', 'ok');
      } catch (e) {
        setStatus('run-status', e.message, 'error');
      }
    });

    // ── Health ───────────────────────────────────────────────────────────────

    document.getElementById('btn-health').addEventListener('click', async function() {
      try {
        const data = await get('/health');
        showOutput('/health', renderJSON(data));
      } catch (e) {
        showOutput('/health', '<p class="empty-state" style="color:var(--error)">' + e.message + '</p>');
      }
    });

    // ── Synthesize ───────────────────────────────────────────────────────────

    document.getElementById('btn-synthesize').addEventListener('click', async function() {
      const intent = document.getElementById('synth-intent').value.trim();
      if (!intent) { setStatus('synth-status', 'Enter an intent string.', 'error'); return; }
      setStatus('synth-status', 'Synthesizing…');
      try {
        const data = await post('/synthesize', { intent: intent, caller: 'ui' });
        showOutput('ConstraintProfile — ' + data.profile_name, renderJSON(data));
        setStatus('synth-status', data.intent_summary, 'ok');
        refreshLog(true);
      } catch (e) {
        setStatus('synth-status', e.message, 'error');
      }
    });

    // ── Path stored ──────────────────────────────────────────────────────────

    document.getElementById('btn-path-stored').addEventListener('click', async function() {
      const start  = document.getElementById('path-start').value.trim();
      const target = document.getElementById('path-target').value.trim();
      if (!start || !target) { setStatus('path-status', 'Enter start and target.', 'error'); return; }
      setStatus('path-status', 'Routing…');
      try {
        const data = await post('/path-stored', { start: start, target: target, caller: 'ui' });
        showOutput('Path — ' + start + ' → ' + target, renderJSON(data));
        setStatus('path-status', data.distance === -1 ? 'Unreachable.' : 'Distance: ' + data.distance, data.distance === -1 ? 'error' : 'ok');
        refreshLog(true);
      } catch (e) {
        setStatus('path-status', e.message, 'error');
      }
    });

    // ── Route stored + intent ────────────────────────────────────────────────

    document.getElementById('btn-route-stored').addEventListener('click', async function() {
      const intent = document.getElementById('route-intent').value.trim();
      const start  = document.getElementById('route-start').value.trim();
      const target = document.getElementById('route-target').value.trim();
      if (!intent || !start || !target) { setStatus('route-status', 'Fill in all three fields.', 'error'); return; }
      setStatus('route-status', 'Routing…');
      try {
        const data = await post('/route-stored', { intent: intent, start: start, target: target, caller: 'ui' });
        showOutput('Route — ' + start + ' → ' + target, renderJSON(data));
        setStatus('route-status', data.distance === -1 ? 'Unreachable.' : 'Distance: ' + data.distance, data.distance === -1 ? 'error' : 'ok');
        refreshLog(true);
      } catch (e) {
        setStatus('route-status', e.message, 'error');
      }
    });

    // ── Nearest stored ───────────────────────────────────────────────────────

    document.getElementById('btn-nearest').addEventListener('click', async function() {
      const start      = document.getElementById('nearest-start').value.trim();
      const candidates = document.getElementById('nearest-candidates').value.trim();
      if (!start || !candidates) { setStatus('nearest-status', 'Enter start and candidates.', 'error'); return; }
      const targets = candidates.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      setStatus('nearest-status', 'Searching…');
      try {
        // /nearest-stored doesn't exist yet — fall back to /path-stored for each candidate
        // and pick the shortest. Works correctly against the loaded graph.
        let best = null;
        for (const t of targets) {
          try {
            const r = await post('/path-stored', { start: start, target: t, caller: 'ui_nearest' });
            if (r.distance !== -1 && (best === null || r.distance < best.distance)) {
              best = { target_id: t, distance: r.distance, path: r.path };
            }
          } catch (_) {}
        }
        if (!best) {
          showOutput('Nearest — from ' + start, renderJSON({ target_id: null, distance: -1, path: null }));
          setStatus('nearest-status', 'None reachable.', 'error');
        } else {
          showOutput('Nearest — from ' + start, renderJSON(best));
          setStatus('nearest-status', 'Nearest: ' + best.target_id + ' (' + best.distance + ')', 'ok');
          refreshLog(true);
        }
      } catch (e) {
        setStatus('nearest-status', e.message, 'error');
      }
    });

    // ── Reorganize ───────────────────────────────────────────────────────────

    document.getElementById('btn-reorg').addEventListener('click', async function() {
      const path = document.getElementById('reorg-path').value.trim();
      if (!path) { setStatus('reorg-status', 'Enter a directory path.', 'error'); return; }
      setStatus('reorg-status', 'Working…');
      try {
        const data = await post('/reorganize', { path: path });
        showOutput('Reorganize — ' + data.files + ' files', renderJSON(data));
        setStatus('reorg-status', data.files + ' files → ' + data.output_path, 'ok');
      } catch (e) {
        setStatus('reorg-status', e.message, 'error');
      }
    });

  </script>

</body>
</html>
